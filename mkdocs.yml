site_name: EV Charging Support Knowledge Base
site_description: Troubleshooting articles for EV charging support teams
site_url: ""  # fill in once GitHub Pages URL is known

theme:
  name: material
  palette:
    primary: teal
    accent: green
  features:
    - navigation.sections
    - search.highlight
    - content.code.copy

nav:
  - Home: 01-knowledge-base/README.md
  - Articles:
      - Charger Not Responding: 01-knowledge-base/charger-not-responding.md
      - Payment Declined But Session Started: 01-knowledge-base/payment-declined-session-started.md
      - Charger Shows Available But Offline: 01-knowledge-base/charger-shows-available-but-offline.md
      - RFID Card Not Recognized: 01-knowledge-base/rfid-card-not-recognized.md
      - Session Ends Unexpectedly: 01-knowledge-base/session-ends-unexpectedly.md
      - Slow Charging Speed: 01-knowledge-base/slow-charging-speed.md
  - Changelog: 01-knowledge-base/changelog.md

docs_dir: docs

exclude_docs: |
  superpowers/**
